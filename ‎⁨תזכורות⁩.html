<title>תזכורות חכמות</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #0a0a0f;
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    color: #fff;
    padding: env(safe-area-inset-top, 20px) 0 env(safe-area-inset-bottom, 20px) 0;
  }
  .header {
    padding: 24px 20px 0;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo {
    width: 44px; height: 44px; border-radius: 12px;
    background: linear-gradient(135deg, #6c63ff, #3ecfcf);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
  }
  .header-text h1 { font-size: 18px; font-weight: 700; }
  .header-text p { font-size: 12px; color: #555; margin-top: 2px; }
  .form { padding: 20px; display: flex; flex-direction: column; gap: 18px; }
  .field label {
    display: block; font-size: 12px; color: #666;
    font-weight: 600; margin-bottom: 8px; letter-spacing: 0.3px;
  }
  input, textarea, select {
    width: 100%; padding: 13px 14px; border-radius: 12px;
    background: #111118; border: 1px solid #1e1e2e;
    color: #fff; font-size: 15px; outline: none;
    font-family: inherit; direction: rtl;
    -webkit-appearance: none;
  }
  textarea { resize: none; }
  input[type="datetime-local"] { color: #fff; }
  .date-label { font-size: 12px; color: #6c63ff; margin-top: 6px; padding-right: 4px; }
  .alerts-box {
    background: #0d1117; border: 1px solid #1e1e2e;
    border-radius: 14px; padding: 14px 16px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .alerts-box .field label { color: #555; font-size: 11px; }
  .divider { height: 1px; background: #1a1a2e; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    padding: 7px 12px; border-radius: 16px; border: 1px solid #1e1e2e;
    background: #111118; color: #666; font-size: 12px;
    cursor: pointer; font-family: inherit; transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .chip.active { background: #6c63ff; border-color: #6c63ff; color: #fff; font-weight: 700; }
  .lists { display: flex; flex-wrap: wrap; gap: 8px; }
  .list-btn {
    padding: 8px 14px; border-radius: 20px; border: none;
    background: #1a1a2e; color: #888; font-size: 13px;
    cursor: pointer; font-family: inherit; transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .list-btn.active { background: #6c63ff; color: #fff; font-weight: 700; }
  .priority { display: flex; gap: 8px; }
  .pri-btn {
    flex: 1; padding: 10px 4px; border-radius: 10px; border: none;
    background: #1a1a2e; color: #666; font-size: 12px;
    cursor: pointer; font-family: inherit; transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .pri-btn.active { color: #fff; font-weight: 700; }
  .preview {
    background: #0d1117; border: 1px solid #1e3a5f;
    border-radius: 12px; padding: 14px 16px; display: none;
  }
  .preview.show { display: block; }
  .preview-label { font-size: 11px; color: #3ecfcf; font-weight: 700; letter-spacing: 1px; margin-bottom: 8px; }
  .preview-text { font-size: 13px; color: #ccc; line-height: 1.6; }
  .btn-copy {
    width: 100%; padding: 16px; border-radius: 14px; border: none;
    background: linear-gradient(135deg, #6c63ff, #3ecfcf);
    color: #fff; font-size: 15px; font-weight: 700;
    cursor: pointer; font-family: inherit; transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-copy.success { background: #2e7d32; }
  .btn-reset {
    width: 100%; padding: 12px; border-radius: 14px;
    border: 1px solid #1a1a2e; background: transparent;
    color: #555; font-size: 14px; cursor: pointer; font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  .how {
    background: #0d1117; border: 1px solid #1a1a2e;
    border-radius: 12px; padding: 14px 16px;
  }
  .how-title { color: #888; font-weight: 700; font-size: 12px; margin-bottom: 8px; }
  .how-step { font-size: 12px; color: #555; line-height: 2; }
  .toast {
    position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
    background: #2e7d32; color: #fff; padding: 12px 24px;
    border-radius: 20px; font-size: 14px; font-weight: 600;
    opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">⏰</div>
  <div class="header-text">
    <h1>תזכורת חדשה</h1>
    <p>ישירות לאייפון שלך</p>
  </div>
</div>

<div class="form">

  <div class="field">
    <label>מה לא לשכוח?</label>
    <input type="text" id="title" placeholder="כותרת התזכורת..." oninput="update()">
  </div>

  <div class="field">
    <label>🕐 מתי?</label>
    <input type="datetime-local" id="datetime" oninput="update()">
    <div class="date-label" id="date-label"></div>
  </div>

  <div class="alerts-box">
    <label style="font-size:12px;color:#666;font-weight:700;">🔔 התראות לפני האירוע</label>

    <div class="field">
      <label>התראה ראשונה</label>
      <div class="chips" id="alert1-chips"></div>
    </div>

    <div class="divider"></div>

    <div class="field">
      <label>התראה שנייה</label>
      <div class="chips" id="alert2-chips"></div>
    </div>
  </div>

  <div class="field">
    <label>📋 לאיזו רשימה?</label>
    <div class="lists" id="lists"></div>
  </div>

  <div class="field">
    <label>⚡ עדיפות</label>
    <div class="priority" id="priority"></div>
  </div>

  <div class="field">
    <label>📝 הערות (אופציונלי)</label>
    <textarea id="notes" rows="2" placeholder="פרטים נוספים..." oninput="update()"></textarea>
  </div>

  <div class="preview" id="preview">
    <div class="preview-label">פקודה לשליחה לקלוד ▼</div>
    <div class="preview-text" id="preview-text"></div>
  </div>

  <button class="btn-copy" id="btn-copy" onclick="copyCmd()">📋 העתק פקודה</button>
  <button class="btn-reset" onclick="resetForm()">ניקוי הטופס</button>

  <div class="how">
    <div class="how-title">איך זה עובד:</div>
    <div class="how-step">1️⃣ מלא את הפרטים למעלה</div>
    <div class="how-step">2️⃣ לחץ "העתק פקודה"</div>
    <div class="how-step">3️⃣ פתח קלוד והדבק</div>
    <div class="how-step">4️⃣ קלוד יוסיף לאייפון שלך ✅</div>
  </div>

</div>

<div class="toast" id="toast">✅ הועתק! עכשיו הדבק בקלוד</div>

<script>
const LISTS = [
  { id: "54CC1323", title: "משימות עבודה", emoji: "💼" },
  { id: "E21002DC", title: "משימות אישיות", emoji: "🙋" },
  { id: "2A6F60BB", title: "Family", emoji: "👨‍👩‍👧" },
  { id: "D4475A15", title: "טיול לפורטוגל", emoji: "✈️" },
  { id: "678CB7CE", title: "טיול לפירנצה", emoji: "🇮🇹" },
  { id: "251BBE62", title: "נססר", emoji: "📋" },
];

const ALERTS = [
  { v: "none", l: "ללא" },
  { v: "5", l: "5 דק׳" },
  { v: "10", l: "10 דק׳" },
  { v: "15", l: "15 דק׳" },
  { v: "30", l: "חצי שעה" },
  { v: "60", l: "שעה" },
  { v: "120", l: "שעתיים" },
  { v: "1440", l: "יום" },
  { v: "2880", l: "יומיים" },
];

const PRIORITIES = [
  { v: "none", l: "ללא", c: "#222" },
  { v: "low", l: "נמוכה", c: "#2e7d32" },
  { v: "medium", l: "בינונית", c: "#e65100" },
  { v: "high", l: "גבוהה", c: "#b71c1c" },
];

let state = { alert1: "30", alert2: "1440", list: "54CC1323", priority: "none" };

// Init datetime
const now = new Date();
now.setHours(now.getHours() + 1, 0, 0, 0);
document.getElementById("datetime").value =
  now.toISOString().slice(0,16);

// Build chips
function buildChips(containerId, stateKey, def) {
  const el = document.getElementById(containerId);
  ALERTS.forEach(a => {
    const b = document.createElement("button");
    b.className = "chip" + (a.v === def ? " active" : "");
    b.textContent = a.l;
    b.onclick = () => {
      state[stateKey] = a.v;
      el.querySelectorAll(".chip").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      update();
    };
    el.appendChild(b);
  });
}
buildChips("alert1-chips", "alert1", "30");
buildChips("alert2-chips", "alert2", "1440");

// Build lists
const listsEl = document.getElementById("lists");
LISTS.forEach(l => {
  const b = document.createElement("button");
  b.className = "list-btn" + (l.id === state.list ? " active" : "");
  b.textContent = l.emoji + " " + l.title;
  b.onclick = () => {
    state.list = l.id;
    listsEl.querySelectorAll(".list-btn").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    update();
  };
  listsEl.appendChild(b);
});

// Build priority
const priEl = document.getElementById("priority");
PRIORITIES.forEach(p => {
  const b = document.createElement("button");
  b.className = "pri-btn" + (p.v === state.priority ? " active" : "");
  b.textContent = p.l;
  if (p.v === state.priority) b.style.background = p.c;
  b.onclick = () => {
    state.priority = p.v;
    priEl.querySelectorAll(".pri-btn").forEach(x => {
      x.classList.remove("active");
      x.style.background = "#1a1a2e";
    });
    b.classList.add("active");
    b.style.background = p.c;
    update();
  };
  priEl.appendChild(b);
});

function pad(n) { return String(n).padStart(2,"0"); }

function formatHuman(str) {
  if (!str) return "";
  const d = new Date(str);
  const days = ["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];
  const months = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
  return `יום ${days[d.getDay()]}, ${d.getDate()} ב${months[d.getMonth()]} ${d.getFullYear()} בשעה ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function alertLabel(v) { return ALERTS.find(a => a.v === v)?.l || ""; }

function buildCmd() {
  const title = document.getElementById("title").value.trim();
  const dt = document.getElementById("datetime").value;
  const notes = document.getElementById("notes").value.trim();
  const listTitle = LISTS.find(l => l.id === state.list)?.title || "";
  const pLabel = state.priority !== "none" ? (state.priority === "high" ? "גבוהה" : state.priority === "medium" ? "בינונית" : "נמוכה") : null;
  const alerts = [state.alert1, state.alert2].filter(a => a !== "none").map(a => alertLabel(a) + " לפני").join(" ו-");

  let cmd = `תוסיף תזכורת: "${title || "ללא כותרת"}" ב-${formatHuman(dt)}, רשימה: "${listTitle}"`;
  if (alerts) cmd += `, התראות: ${alerts}`;
  if (pLabel) cmd += `, עדיפות: ${pLabel}`;
  if (notes) cmd += `, הערה: ${notes}`;
  return cmd;
}

function update() {
  const dt = document.getElementById("datetime").value;
  document.getElementById("date-label").textContent = formatHuman(dt);
  document.getElementById("preview-text").textContent = buildCmd();
  document.getElementById("preview").classList.add("show");
}

function copyCmd() {
  const title = document.getElementById("title").value.trim();
  if (!title) {
    document.getElementById("title").focus();
    document.getElementById("title").style.borderColor = "#f44336";
    setTimeout(() => document.getElementById("title").style.borderColor = "#1e1e2e", 2000);
    return;
  }
  const cmd = buildCmd();
  if (navigator.clipboard) {
    navigator.clipboard.writeText(cmd).then(showToast).catch(fallback);
  } else { fallback(); }

  function fallback() {
    const el = document.createElement("textarea");
    el.value = cmd; el.style.position = "fixed"; el.style.opacity = "0";
    document.body.appendChild(el); el.focus(); el.select();
    try { document.execCommand("copy"); showToast(); } catch(e) {}
    document.body.removeChild(el);
  }
}

function showToast() {
  const t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

function resetForm() {
  document.getElementById("title").value = "";
  document.getElementById("notes").value = "";
  const now = new Date();
  now.setHours(now.getHours() + 1, 0, 0, 0);
  document.getElementById("datetime").value = now.toISOString().slice(0,16);
  state = { alert1: "30", alert2: "1440", list: "54CC1323", priority: "none" };
  document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
  document.querySelectorAll("#alert1-chips .chip")[4].classList.add("active");
  document.querySelectorAll("#alert2-chips .chip")[7].classList.add("active");
  document.querySelectorAll(".list-btn").forEach((b,i) => b.classList.toggle("active", i===0));
  document.querySelectorAll(".pri-btn").forEach((b,i) => {
    b.classList.toggle("active", i===0);
    b.style.background = i===0 ? "#222" : "#1a1a2e";
  });
  document.getElementById("preview").classList.remove("show");
  update();
}

update();
</script>
</body>
</html>
