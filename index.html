<title>פגישה חדשה</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #0a0a0f;
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    color: #fff;
    padding: env(safe-area-inset-top, 20px) 0 env(safe-area-inset-bottom, 20px) 0;
  }
  .header { padding: 24px 20px 0; display: flex; align-items: center; gap: 12px; }
  .logo {
    width: 44px; height: 44px; border-radius: 12px;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    display: flex; align-items: center; justify-content: center; font-size: 24px;
  }
  .header-text h1 { font-size: 18px; font-weight: 700; }
  .header-text p { font-size: 12px; color: #555; margin-top: 2px; }
  .form { padding: 20px; display: flex; flex-direction: column; gap: 18px; }
  .field label { display: block; font-size: 12px; color: #666; font-weight: 600; margin-bottom: 8px; letter-spacing: 0.3px; }
  input, textarea {
    width: 100%; padding: 13px 14px; border-radius: 12px;
    background: #111118; border: 1px solid #1e1e2e;
    color: #fff; font-size: 15px; outline: none;
    font-family: inherit; direction: rtl; -webkit-appearance: none;
  }
  textarea { resize: none; }
  .sublabel { font-size: 12px; color: #4facfe; margin-top: 6px; padding-right: 4px; }
  .sublabel-gray { font-size: 12px; color: #888; margin-top: 6px; padding-right: 4px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    padding: 7px 12px; border-radius: 16px; border: 1px solid #1e1e2e;
    background: #111118; color: #666; font-size: 12px;
    cursor: pointer; font-family: inherit; transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .chip.active { background: #6c63ff; border-color: #6c63ff; color: #fff; font-weight: 700; }
  .dur-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .dur-chip {
    padding: 8px 14px; border-radius: 20px; border: none;
    background: #1a1a2e; color: #888; font-size: 13px;
    cursor: pointer; font-family: inherit; transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .dur-chip.active { background: #00f2fe; color: #fff; font-weight: 700; }
  .alerts-box {
    background: #0d1117; border: 1px solid #1e1e2e;
    border-radius: 14px; padding: 14px 16px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .alerts-box .section-label { font-size: 12px; color: #666; font-weight: 700; }
  .divider { height: 1px; background: #1a1a2e; }
  .alert-label { font-size: 11px; color: #555; margin-bottom: 6px; }
  .preview {
    background: #0d1117; border: 1px solid #1e3a5f;
    border-radius: 12px; padding: 14px 16px; display: none;
  }
  .preview.show { display: block; }
  .preview-label { font-size: 11px; color: #4facfe; font-weight: 700; letter-spacing: 1px; margin-bottom: 8px; }
  .preview-text { font-size: 13px; color: #ccc; line-height: 1.6; }
  .btn-copy {
    width: 100%; padding: 16px; border-radius: 14px; border: none;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: #fff; font-size: 15px; font-weight: 700;
    cursor: pointer; font-family: inherit; transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-copy.success { background: #2e7d32; }
  .btn-reset {
    width: 100%; padding: 12px; border-radius: 14px;
    border: 1px solid #1a1a2e; background: transparent;
    color: #555; font-size: 14px; cursor: pointer; font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  .how { background: #0d1117; border: 1px solid #1a1a2e; border-radius: 12px; padding: 14px 16px; }
  .how-title { color: #888; font-weight: 700; font-size: 12px; margin-bottom: 8px; }
  .how-step { font-size: 12px; color: #555; line-height: 2; }
  .toast {
    position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
    background: #2e7d32; color: #fff; padding: 12px 24px;
    border-radius: 20px; font-size: 14px; font-weight: 600;
    opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; }
  .custom-end { margin-top: 10px; display: none; }
  .custom-end.show { display: block; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">📅</div>
  <div class="header-text">
    <h1>פגישה חדשה</h1>
    <p>ישירות ליומן שלך</p>
  </div>
</div>

<div class="form">

  <div class="field">
    <label>שם הפגישה *</label>
    <input type="text" id="title" placeholder="מה הפגישה?" oninput="update()">
  </div>

  <div class="field">
    <label>🕐 התחלה</label>
    <input type="datetime-local" id="start" oninput="update()">
    <div class="sublabel" id="start-label"></div>
  </div>

  <div class="field">
    <label>⏱ משך הפגישה</label>
    <div class="dur-chips" id="dur-chips"></div>
    <div class="custom-end" id="custom-end-div">
      <label style="font-size:12px;color:#666;font-weight:600;margin-bottom:8px;display:block;">שעת סיום</label>
      <input type="datetime-local" id="custom-end" oninput="update()">
    </div>
    <div class="sublabel-gray" id="end-label"></div>
  </div>

  <div class="alerts-box">
    <div class="section-label">🔔 התראות</div>
    <div>
      <div class="alert-label">התראה ראשונה</div>
      <div class="chips" id="alert1-chips"></div>
    </div>
    <div class="divider"></div>
    <div>
      <div class="alert-label">התראה שנייה</div>
      <div class="chips" id="alert2-chips"></div>
    </div>
  </div>

  <div class="field">
    <label>📍 מיקום (אופציונלי)</label>
    <input type="text" id="location" placeholder="כתובת או שם המקום..." oninput="update()">
  </div>

  <div class="field">
    <label>📝 הערות (אופציונלי)</label>
    <textarea id="notes" rows="2" placeholder="פרטים נוספים..." oninput="update()"></textarea>
  </div>

  <div class="preview" id="preview">
    <div class="preview-label">פקודה לשליחה לקלוד ▼</div>
    <div class="preview-text" id="preview-text"></div>
  </div>

  <button class="btn-copy" id="btn-copy" onclick="copyCmd()">📋 העתק פקודה</button>
  <button class="btn-reset" onclick="resetForm()">ניקוי הטופס</button>

  <div class="how">
    <div class="how-title">איך זה עובד:</div>
    <div class="how-step">1️⃣ מלא את הפרטים למעלה</div>
    <div class="how-step">2️⃣ לחץ "העתק פקודה"</div>
    <div class="how-step">3️⃣ פתח קלוד והדבק</div>
    <div class="how-step">4️⃣ קלוד יוסיף ליומן שלך ✅</div>
  </div>

</div>

<div class="toast" id="toast">✅ הועתק! עכשיו הדבק בקלוד</div>

<script>
const ALERTS = [
  { v: "none", l: "ללא" }, { v: "5", l: "5 דק׳" }, { v: "10", l: "10 דק׳" },
  { v: "15", l: "15 דק׳" }, { v: "30", l: "חצי שעה" }, { v: "60", l: "שעה" },
  { v: "120", l: "שעתיים" }, { v: "1440", l: "יום" }, { v: "2880", l: "יומיים" },
];

const DURATIONS = [
  { v: "30", l: "חצי שעה" }, { v: "60", l: "שעה" }, { v: "90", l: "שעה וחצי" },
  { v: "120", l: "שעתיים" }, { v: "180", l: "3 שעות" }, { v: "custom", l: "מותאם" },
];

let state = { alert1: "30", alert2: "1440", duration: "60" };

function pad(n) { return String(n).padStart(2,"0"); }

function formatHuman(str) {
  if (!str) return "";
  const d = new Date(str);
  const days = ["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];
  const months = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
  return `יום ${days[d.getDay()]}, ${d.getDate()} ב${months[d.getMonth()]} ${d.getFullYear()} בשעה ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function alertLabel(v) { return ALERTS.find(a => a.v === v)?.l || ""; }

function getEndTime() {
  const start = document.getElementById("start").value;
  if (!start) return "";
  if (state.duration === "custom") return document.getElementById("custom-end").value;
  const d = new Date(start);
  d.setMinutes(d.getMinutes() + parseInt(state.duration));
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

// Init start
const now = new Date();
now.setHours(now.getHours() + 1, 0, 0, 0);
document.getElementById("start").value = now.toISOString().slice(0,16);

// Build duration chips
const durEl = document.getElementById("dur-chips");
DURATIONS.forEach(d => {
  const b = document.createElement("button");
  b.className = "dur-chip" + (d.v === state.duration ? " active" : "");
  b.textContent = d.l;
  b.onclick = () => {
    state.duration = d.v;
    durEl.querySelectorAll(".dur-chip").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    document.getElementById("custom-end-div").classList.toggle("show", d.v === "custom");
    update();
  };
  durEl.appendChild(b);
});

// Build alert chips
function buildAlertChips(containerId, stateKey, def) {
  const el = document.getElementById(containerId);
  ALERTS.forEach(a => {
    const b = document.createElement("button");
    b.className = "chip" + (a.v === def ? " active" : "");
    b.textContent = a.l;
    b.onclick = () => {
      state[stateKey] = a.v;
      el.querySelectorAll(".chip").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      update();
    };
    el.appendChild(b);
  });
}
buildAlertChips("alert1-chips", "alert1", "30");
buildAlertChips("alert2-chips", "alert2", "1440");

function buildCmd() {
  const title = document.getElementById("title").value.trim();
  const start = document.getElementById("start").value;
  const location = document.getElementById("location").value.trim();
  const notes = document.getElementById("notes").value.trim();
  const end = getEndTime();
  const alerts = [state.alert1, state.alert2].filter(a => a !== "none").map(a => alertLabel(a) + " לפני").join(" ו-");
  const endStr = end ? ` עד ${pad(new Date(end).getHours())}:${pad(new Date(end).getMinutes())}` : "";
  const locStr = location ? `, מיקום: ${location}` : "";
  const alertStr = alerts ? `, התראות: ${alerts}` : "";
  const noteStr = notes ? `, הערות: ${notes}` : "";
  return `קבע פגישה ביומן: "${title || "ללא כותרת"}" ב-${formatHuman(start)}${endStr}${locStr}${alertStr}${noteStr}`;
}

function update() {
  const start = document.getElementById("start").value;
  document.getElementById("start-label").textContent = formatHuman(start);
  const end = getEndTime();
  if (end && state.duration !== "custom") {
    document.getElementById("end-label").textContent = `סיום: ${pad(new Date(end).getHours())}:${pad(new Date(end).getMinutes())}`;
  }
  document.getElementById("preview-text").textContent = buildCmd();
  document.getElementById("preview").classList.add("show");
}

function copyCmd() {
  const title = document.getElementById("title").value.trim();
  if (!title) {
    const el = document.getElementById("title");
    el.style.borderColor = "#f44336";
    setTimeout(() => el.style.borderColor = "#1e1e2e", 2000);
    el.focus();
    return;
  }
  const cmd = buildCmd();
  if (navigator.clipboard) {
    navigator.clipboard.writeText(cmd).then(showToast).catch(fallback);
  } else fallback();
  function fallback() {
    const el = document.createElement("textarea");
    el.value = cmd; el.style.position = "fixed"; el.style.opacity = "0";
    document.body.appendChild(el); el.focus(); el.select();
    try { document.execCommand("copy"); showToast(); } catch(e) {}
    document.body.removeChild(el);
  }
}

function showToast() {
  const t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

function resetForm() {
  document.getElementById("title").value = "";
  document.getElementById("location").value = "";
  document.getElementById("notes").value = "";
  const now = new Date();
  now.setHours(now.getHours() + 1, 0, 0, 0);
  document.getElementById("start").value = now.toISOString().slice(0,16);
  state = { alert1: "30", alert2: "1440", duration: "60" };
  document.querySelectorAll("#dur-chips .dur-chip").forEach((b,i) => b.classList.toggle("active", i===1));
  document.querySelectorAll("#alert1-chips .chip").forEach((b,i) => b.classList.toggle("active", i===4));
  document.querySelectorAll("#alert2-chips .chip").forEach((b,i) => b.classList.toggle("active", i===7));
  document.getElementById("custom-end-div").classList.remove("show");
  document.getElementById("preview").classList.remove("show");
  update();
}

update();
</script>
</body>
</html>
